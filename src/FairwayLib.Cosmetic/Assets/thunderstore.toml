[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "SuperBattleGolfModding"
name = "FairwayLib.Cosmetic"
description = "A modding library for Super Battle Golf."
websiteUrl = "https://github.com/SuperBattleGolfModding/FairwayLib" 
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2403"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/FairwayLib/release/com.github.SuperBattleGolfModding.FairwayLib.Cosmetic.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = [ "super-battle-golf", ]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/super-battle-golf/category/
super-battle-golf = [ "mods", ]
